name: Publish

# Publish to npm with provenance on a version tag (e.g. `git tag v0.1.1 && git push --follow-tags`).
# Provenance produces the verified "Published from <repo> via GitHub Actions" badge on npm.
# Requires repo secret NPM_TOKEN (an npm granular/automation access token with publish rights
# on @rosmedia/stars-cash-flow-mcp).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # mint OIDC token for provenance (Sigstore)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
